services:
  init-permissions:
    image: alpine:3.20
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /app/uploads && chown -R 65532:65532 /app/uploads"]
    volumes:
      - cloud_data:/app/uploads
    networks:
      - cloud_net

  server:
    build:
      context: ./server
    user: "65532:65532"
    env_file:
      - .env
    environment:
      - PORT=${SERVER_PORT:-4000}
      - UPLOAD_DIR=/app/uploads
    ports:
      - "${SERVER_PORT:-4000}:4000"
    volumes:
      - cloud_data:/app/uploads
    depends_on:
      - init-permissions
    networks:
      - cloud_net

  client:
    build:
      context: ./client
    env_file:
      - .env
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=${SERVER_PORT:-4000}
    depends_on:
      - server
    stdin_open: true
    tty: true
    networks:
      - cloud_net

networks:
  cloud_net:

volumes:
  cloud_data:
