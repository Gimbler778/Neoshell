services:
  init-permissions:
    image: alpine:3.20
    user: "0:0"
    command: ["sh", "-c", "mkdir -p /app/uploads && chown -R 65532:65532 /app/uploads"]
    volumes:
      - cloud_data:/app/uploads
    networks:
      - cloud_net

  server:
    build:
      context: ./server
    user: "65532:65532"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PORT=${SERVER_PORT:-4000}
      - UPLOAD_DIR=/app/uploads
      - AUTH_TOKEN=${AUTH_TOKEN:-}
      - DB_SSL=${DB_SSL:-true}
    ports:
      - "${SERVER_PORT:-4000}:${SERVER_PORT:-4000}"
    volumes:
      - cloud_data:/app/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "const net=require('net');const port=Number(process.env.PORT||4000);const socket=net.connect({host:'127.0.0.1',port},()=>{socket.end();process.exit(0)});socket.on('error',()=>process.exit(1));setTimeout(()=>process.exit(1),2000);"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      - init-permissions
    networks:
      - cloud_net

  client:
    build:
      context: ./client
    env_file:
      - .env
    environment:
      - SERVER_HOST=server
      - SERVER_PORT=${SERVER_PORT:-4000}
      - AUTH_TOKEN=${AUTH_TOKEN:-}
    depends_on:
      - server
    stdin_open: true
    tty: true
    networks:
      - cloud_net

networks:
  cloud_net:

volumes:
  cloud_data:
